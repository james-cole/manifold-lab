name: Normalize Author Names

on:
  push:
    branches: [ main ]
    paths:
      - 'content/publication/**'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  normalize-authors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Replace Name Variations with Admin
        run: |
          # 1. Target quoted variations first to avoid leaving stray quotes
          find content/publication -name "*.md" -exec sed -i 's/"J.H. Cole"/admin/g' {} +
          find content/publication -name "*.md" -exec sed -i 's/"James H. Cole"/admin/g' {} +
          find content/publication -name "*.md" -exec sed -i 's/"James-Cole"/admin/g' {} +
          find content/publication -name "*.md" -exec sed -i 's/"james-cole"/admin/g' {} +
          find content/publication -name "*.md" -exec sed -i 's/"James Cole"/admin/g' {} +

          # 2. Target unquoted variations
          find content/publication -name "*.md" -exec sed -i 's/J.H. Cole/admin/g' {} +
          find content/publication -name "*.md" -exec sed -i 's/James-Cole/admin/g' {} +
          find content/publication -name "*.md" -exec sed -i 's/james-cole/admin/g' {} +
          find content/publication -name "*.md" -exec sed -i 's/James Cole/admin/g' {} +

          # 3. Final safety check: strip quotes from "admin" if they exist
          find content/publication -name "*.md" -exec sed -i 's/"admin"/admin/g' {} +
          find content/publication -name "*.md" -exec sed -i "s/'admin'/admin/g" {} +

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-normalize author names to admin"
          file_pattern: 'content/publication/**'
