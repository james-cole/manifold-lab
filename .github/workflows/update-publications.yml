name: Update publications from ORCID

on:
  schedule:
    - cron: "0 2 * * 1"   # weekly, Monday 02:00 UTC
  workflow_dispatch:

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install Hugo Blox Academic CLI
        run: |
          go install github.com/HugoBlox/hugo-blox-builder/cmd/academic@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Fetch publications from ORCID (BibTeX)
        run: |
          curl -L \
            -H "Accept: application/x-bibtex" \
            https://orcid.org/0000-0003-1908-5588 \
            > publications.bib

      - name: Import BibTeX into Hugo publications
        run: |
          academic import \
            --bibtex publications.bib \
            --publication-dir content/publication \
            --overwrite=false

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add content/publication
          git commit -m "Auto-update publications from ORCID" || exit 0
          git push
