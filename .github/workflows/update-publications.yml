name: Update publications from ORCID

on:
  schedule:
    - cron: "0 2 * * 1"   # weekly
  workflow_dispatch:

jobs:
  publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc curl

      - name: Fetch BibTeX from ORCID
        run: |
          curl -L \
            https://orcid.org/0000-0003-1908-5588.bib \
            > publications.bib

      - name: Convert BibTeX to Hugo publications
        run: |
          mkdir -p content/publication
          pandoc publications.bib \
            --citeproc \
            --metadata=link-citations:true \
            --to markdown \
            --output publications.md

      - name: Split publications into folders
        run: |
          python << 'EOF'
          import os, re, textwrap

          with open("publications.md") as f:
              content = f.read()

          entries = re.split(r'\n#{2,}\s+', content)

          for entry in entries:
              if not entry.strip():
                  continue

              title = entry.splitlines()[0]
              slug = re.sub(r'[^a-z0-9]+', '-', title.lower()).strip('-')

              pub_dir = f"content/publication/{slug}"
              os.makedirs(pub_dir, exist_ok=True)

              with open(f"{pub_dir}/index.md", "w") as out:
                  out.write("---\n")
                  out.write(f"title: \"{title}\"\n")
                  out.write("---\n\n")
                  out.write(entry)
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add content/publication
          git commit -m "Auto-update publications from ORCID" || exit 0
          git push

