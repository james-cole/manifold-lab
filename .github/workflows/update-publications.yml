name: Update publications from ORCID

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl python3

      # ------------------------------------------------------------
      # 1. Fetch ORCID works (JSON – supported)
      # ------------------------------------------------------------
      - name: Fetch ORCID works
        run: |
          curl -L \
            -A "Mozilla/5.0 (GitHub Actions)" \
            -H "Accept: application/json" \
            https://pub.orcid.org/v3.0/0000-0003-1908-5588/works \
            > works.json

      # ------------------------------------------------------------
      # 2. Extract DOIs and fetch CSL-JSON from Crossref
      # ------------------------------------------------------------
      - name: Generate Hugo publication pages
        run: |
          python3 - << 'EOF'
          import json, os, re, subprocess, sys, textwrap

          with open("works.json") as f:
              orcid = json.load(f)

          dois = set()
          for group in orcid.get("group", []):
              for ws in group.get("work-summary", []):
                  for ext in ws.get("external-ids", {}).get("external-id", []):
                      if ext.get("external-id-type") == "doi":
                          dois.add(ext.get("external-id-value").lower())

          if not dois:
              print("No DOIs found.")
              sys.exit(1)

          outdir = "content/publication"
          os.makedirs(outdir, exist_ok=True)

          for doi in sorted(dois):
              res = subprocess.run(
                  [
                      "curl", "-L",
                      "-H", "Accept: application/vnd.citationstyles.csl+json",
                      f"https://doi.org/{doi}"
                  ],
                  capture_output=True, text=True
              )

              if res.returncode != 0:
                  continue

              try:
                  item = json.loads(res.stdout)
              except json.JSONDecodeError:
                  continue

              title = item.get("title", "Untitled")
              year = item.get("issued", {}).get("date-parts", [[None]])[0][0]
              journal = item.get("container-title", "")
              authors = []

              for a in item.get("author", []):
                  if "family" in a:
                      name = f"{a.get('given','')} {a['family']}".strip()
                      authors.append(name)

              slug = re.sub(r"[^a-z0-9]+", "-", title.lower()).strip("-")
              pub_dir = os.path.join(outdir, slug)
              os.makedirs(pub_dir, exist_ok=True)

              outpath = os.path.join(pub_dir, "index.md")
              if os.path.exists(outpath):
                  continue

              with open(outpath, "w") as out:
                  out.write("---\n")
                  out.write(f'title: "{title}"\n')
                  if year:
                      out.write(f"date: {year}-01-01\n")
                  if journal:
                      out.write(f'publication: "*{journal}*"\n')
                  out.write(f'doi: "{doi}"\n')
                  out.write("---\n\n")

                  if authors:
                      out.write("**Authors:** " + ", ".join(authors) + "\n\n")

                  out.write(f"**DOI:** https://doi.org/{doi}\n")

          EOF

      # ------------------------------------------------------------
      # 3. Commit changes
      # ------------------------------------------------------------
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add content/publication
          git commit -m "Auto-update publications from ORCID (CSL JSON)" || exit 0
          git push
