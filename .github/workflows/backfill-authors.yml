name: Backfill publication authors

on:
  workflow_dispatch:

jobs:
  backfill-authors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl python3

      - name: Backfill authors
        run: |
          python3 << 'EOF'
          import os, re, subprocess, json, unicodedata

          ADMIN_ORCID = "0000-0003-1908-5588"
          ROOT = "content/publication"

          def normalise(text):
              text = unicodedata.normalize("NFKD", text)
              text = "".join(c for c in text if not unicodedata.combining(c))
              text = re.sub(r"[^\w\s]", "", text.lower())
              return re.sub(r"\s+", " ", text).strip()

          def resolve_author(given, family, orcid=None):
              if orcid:
                  if orcid.replace("https://orcid.org/", "") == ADMIN_ORCID:
                      return "admin"
              initials = "".join(p[0] for p in given.split()).lower()
              if normalise(family) == "cole" and re.match(r"^j.*h", initials):
                  return "admin"
              return f"{given} {family}".strip()

          for root, _, files in os.walk(ROOT):
              if "index.md" not in files:
                  continue
              path = os.path.join(root, "index.md")
              text = open(path).read()
              if re.search(r"^authors:", text, re.M):
                  continue

              m = re.search(r'doi:\s*"?([^"\n]+)', text)
              if not m:
                  continue
              doi = m.group(1)

              r = subprocess.run(
                  ["curl", "-L", "--compressed",
                   "-H", "Accept: application/vnd.citationstyles.csl+json",
                   f"https://doi.org/{doi}"],
                  capture_output=True
              )
              try:
                  record = json.loads(r.stdout.decode("utf-8", errors="replace"))
              except Exception:
                  continue

              authors = []
              for a in record.get("author", []):
                  if "family" not in a:
                      continue
                  authors.append(
                      resolve_author(
                          a.get("given", ""),
                          a.get("family", ""),
                          a.get("ORCID")
                      )
                  )

              if not authors:
                  continue

              fm, body = text.split("---", 2)[1:]
              fm += "\nauthors:\n"
              for a in authors:
                  if a == "admin":
                      fm += "  - admin\n"
                  else:
                      fm += f'  - "{a}"\n'

              with open(path, "w") as f:
                  f.write(f"---{fm}---{body}")

          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add content/publication
          git commit -m "Backfill author names to admin" || true
          git push

